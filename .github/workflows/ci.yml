name: CI - Link Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 매주 월요일 오전 9시 (KST) = UTC 00:00
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude "localhost"
            --exclude "127.0.0.1"
            --exclude "discord.gg"
            --exclude "facebook.com"
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Broken Link] 깨진 링크 감지 - ${new Date().toISOString().split('T')[0]}`;
            const body = `자동 링크 검사에서 깨진 링크가 감지되었습니다.\n\n[워크플로우 실행 결과](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인해 주세요.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['broken link']
            });
